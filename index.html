<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Directorio de Células Mujeres SOS · RFC</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --white: #ffffff;
    --off-white: #f0ede8;
    --dark: #0a0a0a;
    --dark-mid: #111111;
    --card-bg: #141414;
    --line: rgba(255,255,255,0.08);
  }

  html { scroll-behavior: smooth; }

  body {
    background: radial-gradient(ellipse 900px 600px at 50% -10%, rgba(201,168,76,0.08), transparent),
                var(--dark);
    color: var(--white);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrapper {
    max-width: 880px;
    margin: 0 auto;
    padding: 56px 24px 48px;
  }

  /* ── HEADER ── */
  header {
    text-align: center;
    animation: fadeDown 0.8s ease both;
  }
  header img {
    width: 72px;
    height: auto;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.25));
  }
  .eyebrow {
    font-size: 0.68rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.7);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: clamp(1.6rem, 4vw, 2.3rem);
    color: var(--gold-light);
    line-height: 1.25;
  }
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--off-white);
    opacity: 0.75;
    margin-top: 10px;
    font-size: clamp(0.9rem, 2vw, 1.05rem);
  }

  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 32px auto;
  }

  /* ── SELECTOR LABEL ── */
  .section-label {
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.7);
    margin-bottom: 20px;
  }

  /* ── CHIP GRID ── */
  .chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    max-width: 720px;
    margin: 0 auto;
    animation: fadeUp 0.8s ease 0.15s both;
  }

  .chip {
    font-family: 'Inter', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    color: var(--white);
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 999px;
    padding: 10px 20px;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.2s;
  }
  .chip:hover {
    transform: translateY(-2px);
    border-color: var(--gold);
    background: rgba(201,168,76,0.1);
    color: var(--gold-light);
  }
  .chip:focus-visible {
    outline: 2px solid var(--gold-light);
    outline-offset: 2px;
  }
  .chip.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    box-shadow: 0 0 22px rgba(201,168,76,0.35);
  }

  /* ── DETAIL CARD ── */
  .card-stage {
    max-width: 560px;
    margin: 48px auto 0;
    position: relative;
  }

  .tab {
    position: absolute;
    top: -18px;
    left: 28px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: var(--gold);
    color: var(--dark);
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.05rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 14px rgba(0,0,0,0.4);
    z-index: 2;
    transition: transform 0.2s;
  }

  .card {
    background: linear-gradient(160deg, var(--card-bg), var(--dark-mid));
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 18px;
    padding: 40px 32px 32px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    transition: opacity 0.22s ease, transform 0.22s ease;
  }
  .card.swap {
    opacity: 0;
    transform: translateY(8px);
  }

  .card h2 {
    font-family: 'Playfair Display', serif;
    font-weight: 700;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    color: var(--gold-light);
    margin-bottom: 22px;
  }

  .row {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .row:last-of-type { border-bottom: none; }

  .row .icon {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: rgba(201,168,76,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.9rem;
    flex-shrink: 0;
  }

  .row .text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .row .label {
    font-size: 0.63rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
  }
  .row .value {
    font-size: 0.94rem;
    color: var(--off-white);
    line-height: 1.5;
  }
  .row .value a {
    color: var(--gold-light);
    text-decoration: none;
    border-bottom: 1px solid rgba(232,201,122,0.35);
  }
  .row .value a:hover { border-bottom-color: var(--gold-light); }

  .cta {
    margin-top: 24px;
    text-align: center;
  }
  .cta a {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    letter-spacing: 0.04em;
    color: var(--gold-light);
    text-decoration: none;
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 10px 22px;
    transition: background 0.2s, color 0.2s;
  }
  .cta a:hover {
    background: var(--gold);
    color: var(--dark);
  }
  .cta .muted {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.35);
    font-style: italic;
  }

  /* ── FOOTER ── */
  .footer {
    margin-top: 56px;
    text-align: center;
  }
  .footer p {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.25);
    font-style: italic;
    line-height: 1.8;
  }
  .footer strong {
    color: rgba(201,168,76,0.5);
    font-style: normal;
  }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }

  @media (max-width: 480px) {
    .card { padding: 32px 22px 26px; }
  }
</style>
</head>

  const chipsEl = document.getElementById('chips');
  const cardEl = document.getElementById('card');
  const tabEl = document.getElementById('tab');

  function renderCardContent(c) {
    const mapsRow = c.maps
      ? `<div class="cta"><a href="${c.maps}" target="_blank" rel="noopener">Ver en el mapa ↗</a></div>`
      : `<div class="cta"><span class="muted">Ubicación no disponible en el mapa</span></div>`;

    cardEl.innerHTML = `
      <h2>${c.nombre}</h2>
      <div class="row">
        <div class="icon">👤</div>
        <div class="text">
          <span class="label">Responsable</span>
          <span class="value">${c.responsable}</span>
        </div>
      </div>
      <div class="row">
        <div class="icon">📍</div>
        <div class="text">
          <span class="label">Dirección</span>
          <span class="value">${c.direccion}</span>
        </div>
      </div>
      <div class="row">
        <div class="icon">⏱</div>
        <div class="text">

          <span class="value">${c.dia}, ${c.hora}</span>
        </div>
      </div>
      <div class="row">
        <div class="icon">📞</div>
        <div class="text">
          <span class="label">Teléfono</span>
          <span class="value"><a href="tel:${c.tel_href}">${c.telefono}</a></span>
        </div>
      </div>
      ${mapsRow}
    `;
    tabEl.textContent = c.nombre.trim().charAt(0).toUpperCase();
  }

  function selectCelula(index, chipButtons) {
    const c = celulas[index];

    chipButtons.forEach((btn, i) => {
      const isActive = i === index;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-selected', isActive ? 'true' : 'false');
    });

    cardEl.classList.add('swap');
    window.setTimeout(() => {
      renderCardContent(c);
      cardEl.classList.remove('swap');
    }, 140);
  }

  function init() {

    celulas.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'chip';
      btn.textContent = c.nombre;
      btn.setAttribute('role', 'option');
      btn.setAttribute('aria-selected', 'false');
      btn.addEventListener('click', () => selectCelula(i, chipButtons));
      chipsEl.appendChild(btn);
      chipButtons.push(btn);
    });

    // Mostrar la primera célula por defecto
    chipButtons[0].classList.add('active');
    chipButtons[0].setAttribute('aria-selected', 'true');
    renderCardContent(celulas[0]);
  }

  init();
</script>
</body>
</html>
